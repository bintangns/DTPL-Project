{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Hapus Category</title>
    <link rel="stylesheet" href="{% static 'products/css/admin.css' %}">
</head>
<body class="admin-body">
    <main class="admin-main">
        <section class="admin-content-section">
            <div class="admin-form-card">
                <h1>Hapus Category</h1>
                <p>Yakin ingin menghapus category <strong>{{ category.name }}</strong>?</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="admin-form-actions">
                        <a href="{% url 'products_admin:category_list' %}" class="btn-view">Batal</a>
                        <button type="submit" class="btn-delete">Hapus</button>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
