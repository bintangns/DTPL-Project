{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link rel="stylesheet" href="{% static 'products/css/admin.css' %}">
</head>
<body class="admin-body">
    <main class="admin-main">
        <section class="admin-content-section">
            <div class="admin-form-card">
                <h1>{{ page_title }}</h1>

                <form method="post" class="admin-form">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <div class="admin-form-actions">
                        <a href="{% url 'products_admin:list' %}" class="btn-view">Batal</a>
                        <button type="submit" class="admin-primary-btn">{{ submit_label }}</button>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
