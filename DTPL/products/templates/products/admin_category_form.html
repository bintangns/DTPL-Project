{% extends "adminpanel/base.html" %}

{% block title %}{{ page_title }} — Admin{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ page_title }}</h1>
</div>

<div class="admin-form-card">
    <form method="post" class="admin-form">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="admin-form-actions">
            <a href="{% url 'products_admin:category_list' %}" class="btn-sm btn-view">Batal</a>
            <button type="submit" class="admin-primary-btn">{{ submit_label }}</button>
        </div>
    </form>
</div>
{% endblock %}
